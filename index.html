<!DOCTYPE html>
<html>
<head>
    <title>FAHHH NETWORK CHALLENGE</title>
    <style>
        body { background-color: #ff0055; color: white; font-family: 'Comic Sans MS', cursive; text-align: center; padding: 50px; }
        .box { background: pink; border: 10px solid red; padding: 30px; border-radius: 30px; display: inline-block; }
        button { background: red; color: white; padding: 15px; border: none; cursor: pointer; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>(╯°□°）╯ FAHHH!!</h1>
        <img src="fahh_happy.png" width="200"><br><br>
        <button onclick="checkServer()">PING SECURITY SERVER</button>
        <p id="msg">System Ready.</p>
    </div>

    <script>
        // Register the Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        async function checkServer() {
            document.getElementById('msg').innerText = "Fetching status...";
            // This triggers the fetch event in sw.js
            await fetch('flag_status.txt');
            document.getElementById('msg').innerText = "Status received. Check the network traffic, Senpai!";
        }
    </script>
</body>
</html>
